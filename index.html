<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fallback SEO — overridden dynamically by react-helmet-async -->
    <title>
      Epidavros Villas &amp; Suites | Akros Eco Farm — Nea Epidavros, Greece
    </title>
    <meta
      name="description"
      content="Luxury eco villas near the ancient Theatre of Epidaurus. Shared pool, sea views, 1 km from the beach. Book direct for the best rates."
    />
    <meta name="theme-color" content="#94ca3e" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph fallback -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Epidavros Villas &amp; Suites | Akros Eco Farm"
    />
    <meta
      property="og:description"
      content="Six unique eco villas with sea views and shared pool in Nea Epidavros, Greece."
    />
    <meta
      property="og:image"
      content="https://epidavrosrentalvillas.gr/wp-content/uploads/2025/02/Sea-view-Mountain-view-Akros-Eco-Estate-1.jpg"
    />

    <!-- Canonical & hreflang fallbacks -->
    <link rel="canonical" href="https://www.epidavrosvillas.gr" />
    <link rel="alternate" hreflang="en" href="https://www.epidavrosvillas.gr" />
    <link rel="alternate" hreflang="el" href="https://www.epidavrosvillas.gr" />
    <link rel="alternate" hreflang="de" href="https://www.epidavrosvillas.gr" />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://www.epidavrosvillas.gr"
    />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://epidavrosrentalvillas.gr" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
